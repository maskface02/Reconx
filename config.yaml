# reconx Configuration Template

# Target domain
target: example.com

# Scope (subdomains to include)
scope: []
  # - "*.example.com"
  # - "example.com"

# Exclusions (subdomains to exclude)
exclude: []
  # - "out-of-scope.example.com"

# Rate limiting
rate_limit: 50          # requests per second globally
threads: 20
timeout: 10             # seconds per request

# Wordlists
wordlist_dirs: /usr/share/seclists/Discovery/Web-Content/
wordlist_subs: /usr/share/seclists/Discovery/DNS/

# Tool paths (leave empty to use PATH)
tools:
  subfinder: subfinder
  amass: amass
  dnsx: dnsx
  httpx: httpx
  katana: katana
  ffuf: ffuf
  feroxbuster: feroxbuster
  paramspider: paramspider
  arjun: arjun
  nuclei: nuclei
  sqlmap: sqlmap
  dalfox: dalfox
  gf: gf
  secretfinder: secretfinder
  trufflehog: trufflehog
  wafw00f: wafw00f
  masscan: masscan
  nmap: nmap
  nikto: nikto
  waybackurls: waybackurls
  gau: gau
  gospider: gospider
  hakrawler: hakrawler
  linkfinder: linkfinder
  x8: x8
  xsstrike: xsstrike
  ssrfire: ssrfire
  jwt_tool: jwt-tool
  gitdorker: gitdorker
  ghauri: ghauri

# Nuclei templates path
nuclei_templates: /usr/share/nuclei-templates/

# Optional: Interact.sh server for blind SSRF testing
interactsh_server: ""

# Optional: GitHub token for gitdorker
github_token: ""

# Optional: Chaos API key for subdomain discovery
chaos_api_key: ""
